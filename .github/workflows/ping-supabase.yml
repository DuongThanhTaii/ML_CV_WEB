name: Ping Supabase

# Free-tier Supabase pauses projects after 7 days of inactivity.
# This workflow runs a lightweight query every 6 days to keep it warm.

on:
  schedule:
    - cron: '0 12 */6 * *'    # every 6 days at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit health endpoint
        run: |
          curl -fsSL \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?limit=1"
